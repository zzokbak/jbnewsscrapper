<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쪽박탈출! 주식뉴스 수집기 Ver 0.8</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E11;
    --panel:#12161B;
    --line:#232A31;
    --ink:#E8E6DF;
    --mute:#8B939B;
    --up:#D64545;      /* 한국 증시 관행: 상승/강조 = 적색 */
    --down:#3B82C4;    /* 하락/보조 = 청색 */
    --amber:#E8A93A;   /* 티커 앰버 */
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'IBM Plex Mono', monospace;
  }
  h1,h2,.serif{font-family:'Noto Serif KR', serif;}

  /* ---- 상단 티커: 1번째 줄(시장 지표, 고정/무애니메이션) + 2번째 줄(속보, 스크롤) ---- */
  .tape-wrap{
    background:var(--bg); border-bottom:1px solid var(--line);
    overflow:hidden; position:relative;
  }
  .tape-row{
    overflow:hidden; white-space:nowrap; height:30px;
  }
  .tape-row + .tape-row{ border-top:1px solid var(--line); }

  /* 1번째 줄: 시장 지표 - 움직이지 않고 한 줄에 고정, 넘치면 가로 스크롤 */
  #marketRow{
    overflow-x:auto; overflow-y:hidden; white-space:nowrap;
    display:flex; align-items:center; gap:18px; padding:0 14px;
    scrollbar-width:none;
  }
  #marketRow::-webkit-scrollbar{ display:none; }
  .mkt{ display:inline-flex; align-items:baseline; gap:5px; font-size:12.5px; white-space:nowrap; }
  .mkt .mkt-name{ color:var(--mute); }
  .mkt .mkt-val{ color:var(--ink); font-weight:600; }
  .mkt .mkt-chg.up{ color:var(--up); }
  .mkt .mkt-chg.down{ color:var(--down); }

  /* 2번째 줄: 속보 - 계속 옆으로 흐름 */
  .tape{
    display:inline-block; padding-left:100%;
    animation:scroll 56s linear infinite;
    color:var(--amber); font-weight:600; font-size:13px; line-height:30px; letter-spacing:.03em;
  }
  .tape span{margin-right:48px;}
  @keyframes scroll{ from{transform:translateX(0);} to{transform:translateX(-100%);} }
  @media (prefers-reduced-motion: reduce){ .tape{animation:none; padding-left:16px;} }

  header{
    padding:28px 24px 18px; border-bottom:1px solid var(--line);
    display:flex; flex-direction:column; gap:10px;
  }
  header .title-block{ width:100%; text-align:center; }
  header h1{font-size:26px; margin:0; font-weight:900; letter-spacing:-.01em;}
  header .sub{color:var(--mute); font-size:12.5px; margin-top:4px;}
  .status{width:100%; font-size:12px; color:var(--mute); text-align:right;}
  .status b{color:var(--amber); font-weight:600;}
  .dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--up); margin-right:6px; animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}

  .controls{
    padding:14px 24px; border-bottom:1px solid var(--line);
    display:flex; gap:8px; flex-wrap:wrap; align-items:center; justify-content:flex-end;
  }
  .btn{
    border:1px solid var(--amber); background:transparent; color:var(--amber);
    padding:7px 14px; border-radius:2px; font-size:12px; cursor:pointer; font-family:inherit;
  }
  .btn:hover{background:var(--amber); color:var(--bg);}
  .diag{color:var(--mute); font-size:11px; margin-right:auto;}

  /* ---- 언론사 탭 ---- */
  .tabs{
    max-width:900px; margin:0 auto; padding:16px 24px 0;
    display:flex; gap:6px; flex-wrap:wrap;
  }
  .tab{
    border:1px solid var(--line); background:var(--panel); color:var(--mute);
    padding:7px 14px; border-radius:2px 2px 0 0; font-size:12.5px; cursor:pointer;
    font-family:inherit; user-select:none; white-space:nowrap;
  }
  .tab .count{color:var(--mute); font-size:10.5px; margin-left:5px;}
  .tab.active{color:var(--bg); background:var(--amber); border-color:var(--amber); font-weight:600;}
  .tab.active .count{color:#00000099;}

  main{max-width:900px; margin:0 auto; padding:0 24px 60px; border-top:1px solid var(--line);}
  .empty{padding:60px 0; text-align:center; color:var(--mute); font-size:13px;}

  .item{
    display:grid; grid-template-columns:64px 1fr auto; gap:16px; align-items:start;
    padding:16px 0; border-bottom:1px solid var(--line);
  }
  .item .time{color:var(--mute); font-size:11px; padding-top:3px;}
  .item a.title{color:var(--ink); text-decoration:none; font-size:15.5px; line-height:1.5; font-weight:500;}
  .item a.title:hover{color:var(--amber); text-decoration:underline;}
  .item .src{color:var(--mute); font-size:11.5px; margin-top:5px;}
  .copy-btn{
    background:none; border:1px solid var(--line); color:var(--mute); cursor:pointer;
    width:30px; height:30px; border-radius:2px; display:flex; align-items:center; justify-content:center;
    padding:0; margin-top:2px;
  }
  .copy-btn:hover{border-color:var(--amber); color:var(--amber);}
  .copy-btn.copied{border-color:var(--up); color:var(--up);}
  .copy-btn svg{width:15px; height:15px;}

  /* 제목에 '속보'가 포함된 기사는 연분홍 배경으로 강조 */
  .item.breaking{
    background:#FFD9EA; margin:0 -14px; padding:16px 14px; border-radius:4px; border-bottom-color:#FFC2DE;
  }
  .item.breaking .time{ color:#8A3B60; }
  .item.breaking a.title{ color:#4A0E2C; }
  .item.breaking a.title:hover{ color:#B0125F; }
  .item.breaking .src{ color:#8A3B60; }
  .item.breaking .copy-btn{ border-color:#B0125F55; color:#8A3B60; }
  .item.breaking .copy-btn:hover{ border-color:#B0125F; color:#B0125F; }

  /* 기사 제목에 마우스를 올리면 나타나는 큰 미리보기 창 */
  #previewPanel{
    position:fixed; right:24px; bottom:24px; width:min(440px, 90vw); max-height:60vh;
    background:var(--panel); border:1px solid var(--amber); border-radius:6px;
    box-shadow:0 12px 40px rgba(0,0,0,.5); padding:18px 20px; overflow:hidden;
    opacity:0; pointer-events:none; transform:translateY(10px);
    transition:opacity .15s ease, transform .15s ease; z-index:999;
  }
  #previewPanel.show{ opacity:1; transform:translateY(0); }
  #previewPanel .pv-src{ color:var(--amber); font-size:11px; font-weight:600; margin-bottom:6px; }
  #previewPanel .pv-title{ font-family:'Noto Serif KR', serif; font-size:16px; font-weight:700; margin-bottom:10px; line-height:1.4; }
  #previewPanel .pv-body{ color:var(--ink); font-size:13px; line-height:1.7; white-space:pre-line; }
  #previewPanel .pv-loading{ color:var(--mute); font-size:12.5px; }

  footer{color:var(--mute); font-size:11px; text-align:center; padding:24px; border-top:1px solid var(--line);}
</style>
</head>
<body>

<div class="tape-wrap">
  <div class="tape-row" id="marketRow"></div>
  <div class="tape-row"><div class="tape" id="tape2"></div></div>
</div>

<header>
  <div class="title-block">
    <h1>쪽박탈출! 주식뉴스 수집기</h1>
    <div class="sub">(주식 관련 뉴스 자동 수집 · 최신순 정렬)</div>
  </div>
  <div class="status">
    <div><span class="dot"></span>자동 갱신 <b>ON</b> · 10분 주기</div>
    <div id="lastUpdated">마지막 갱신 — 불러오는 중…</div>
  </div>
</header>

<div class="controls">
  <span class="diag" id="diag"></span>
</div>

<div class="tabs" id="tabs"></div>

<main>
  <div id="list"><div class="empty">뉴스를 불러오는 중입니다…</div></div>
</main>

<footer>이 페이지는 각 언론사가 공개한 RSS 피드를 표시만 합니다. 기사 본문은 원문 링크에서 확인하세요.</footer>

<div id="previewPanel"></div>

<script>
// 관리자만 수정하는 검색 키워드 (화면에는 표시되지 않음, 기사 필터링에만 사용)

// 이 자체로 이미 증시 관련이라 확실한 키워드 — 이것만 있으면 바로 수집
const STRONG_MARKET_KEYWORDS = ["실적발표","리밸런싱","주식","주가","증권","애널리스트","월가"];

// 증시 아닌 곳에서도 자주 쓰이는 애매한 키워드 — 아래 "증시 맥락 단어"가 같이 있을 때만 수집
// (예: "안드로이드"만 있으면 그냥 스마트폰 뉴스일 수 있어서, "주가"·"상장" 같은 증시 단어가 같이 있어야 통과)
const CONTEXT_REQUIRED_KEYWORDS = ["반도체","로봇","안드로이드","임상실험","메모리","호르무즈"];

// 위 애매한 키워드들과 함께 있어야 "진짜 증시 뉴스"로 인정하는 맥락 단어
const MARKET_CONTEXT_TERMS = ["주식","증권","주가","코스피","코스닥","나스닥","다우","시황","증시","매수","매도","급등","급락","실적","상장","공시","시가총액","외국인","기관","개인투자자","투자","펀드","ETF","금리","환율"];

// 두 단어가 "같이" 나올 때만 수집하는 조합 (삼성/하이닉스는 이름만으론 노이즈가 너무 많아 이렇게 좁혀서 씀)
// 이 조합들도 증시 맥락 단어가 같이 있어야 최종 통과됨
const KEYWORD_AND_GROUPS = [
  ["삼성","계약"],
  ["하이닉스","계약"],
  ["삼성","주가"],
  ["하이닉스","주가"],
];

// 포털 검색(네이버·다음)에 실제로 보낼 검색어 목록에는 애매한 키워드까지 전부 포함 (검색 자체는 넓게, 최종 필터링에서 좁힘)
const KEYWORDS = [...STRONG_MARKET_KEYWORDS, ...CONTEXT_REQUIRED_KEYWORDS];

// 언론사별 증권/경제 RSS. 구글 뉴스 검색 RSS는 클라우드 서버 IP를 차단하는 경우가 많아
// 안정성이 떨어져서, 언론사가 직접 제공하는 RSS로 대체했습니다.
// 아래 두 곳은 실제로 접속해 데이터가 오는 것까지 확인한 주소입니다.
// 다른 언론사를 추가하고 싶으면 "언론사명 RSS 주소"로 검색해 최신 주소를 확인한 뒤 이 배열에 추가하세요.
const SOURCES = [
  { name: "한국경제",   url: "https://www.hankyung.com/feed/finance" },
  { name: "파이낸셜뉴스", url: "https://www.fnnews.com/rss/r20/fn_realnews_stock.xml" },
  { name: "뉴시스",     url: "https://www.newsis.com/RSS/sokbo.xml" }, // 속보 전용 피드 (티커 소스로도 사용)
];

// 해외 소스: 로이터는 2020년경 공개 RSS를 완전히 폐지해서 제외했습니다(공식 피드 없음, 지금 나오는 건 전부 비공식 스크래핑 서비스라 신뢰하기 어려움).
// 블룸버그·폭스비즈니스는 실제 접속해 데이터가 오는 것을 확인한 주소입니다.
// 폭스비즈니스는 markets(시황) 피드 하나만으로는 키워드 매칭이 잘 안 걸려서 economy(경제) 피드도 같이 추가했습니다.
const SOURCES_EN = [
  { name: "Bloomberg",     url: "https://feeds.bloomberg.com/markets/news.rss" },
  { name: "Fox Business",  url: "https://moxie.foxbusiness.com/google-publisher/markets.xml" },
  { name: "Fox Business",  url: "https://moxie.foxbusiness.com/google-publisher/economy.xml" },
];

// 한글 키워드 → 영어 키워드 매핑 (해외 소스 필터링용)
const KEYWORDS_EN = ["Samsung","SK Hynix","Hynix","earnings","rebalancing","stock","shares","securities","analyst","Wall Street","semiconductor","chip","robot","Android","clinical trial","memory chip","Hormuz"];

// 네이버·다음 포털 검색: 구글 뉴스와 달리 무료 공개 RSS가 없어서, 각 포털의 공식 오픈 API를 씁니다.
// API 키(Client ID/Secret)는 브라우저에 노출하면 안 되므로 Worker 안에서만 사용합니다.
// 아래 스위치를 true로 바꾸면 시도합니다 — 단, Worker에 먼저 키를 등록해야 동작합니다 (안내 참고).
const USE_PORTAL_SEARCH = true;

const REFRESH_MS = 10 * 60 * 1000; // 10분
const MAX_ITEMS = 150;
const PER_SOURCE_MAX = 10; // 탭(언론사)마다 최대 10개까지만

// 1순위: 본인 소유의 Cloudflare Worker 프록시
const MY_WORKER = "https://stock-news.millejdj.workers.dev";

// 2순위: 백업용 공개 프록시 (본인 워커가 일시적으로 안 될 때만 시도)
const PROXIES = [
  ...(MY_WORKER ? [url => MY_WORKER + "/?url=" + encodeURIComponent(url)] : []),
  url => "https://api.codetabs.com/v1/proxy/?quest=" + encodeURIComponent(url),
];

const PROXY_TIMEOUT_MS = 8000; // 프록시 하나당 8초 넘으면 포기하고 다음으로

let allItems = [];        // 키워드 필터를 통과한 전체 기사 {title, link, pubDate, source}
let renderedItems = [];   // 현재 화면에 그려진 기사 목록 (복사 버튼이 참조)
let activeTab = "ALL";
let failedSources = [];

async function fetchWithProxies(targetUrl){
  let lastError = "";
  for(const build of PROXIES){
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), PROXY_TIMEOUT_MS);
    try{
      const res = await fetch(build(targetUrl), { signal: controller.signal });
      clearTimeout(timer);
      if(res.ok){
        const text = await res.text();
        if(text && text.includes("<item")) return text;
        lastError = "빈 응답";
      }else{
        lastError = "HTTP " + res.status;
      }
    }catch(e){
      clearTimeout(timer);
      lastError = e.name === "AbortError" ? "시간 초과" : e.message;
    }
  }
  throw new Error(lastError || "모든 프록시 실패");
}

function normalizeTitle(t){
  return t.replace(/\s*[-–]\s*[^-–]{1,20}$/,"").replace(/\s+/g,"").toLowerCase();
}

function matchesKeyword(text){
  if(!text) return false;
  return KEYWORDS.some(k => text.includes(k));
}

function hasMarketContext(text){
  return MARKET_CONTEXT_TERMS.some(k => text.includes(k));
}

// 본문에서 증시 관련 핵심 문장만 추려서 짧게 함축 (스크롤 없이 패널 안에 들어가도록)
function condenseMarketText(text, maxLen = 220){
  if(!text) return text;
  const relevantTerms = [...STRONG_MARKET_KEYWORDS, ...CONTEXT_REQUIRED_KEYWORDS, ...MARKET_CONTEXT_TERMS];
  const sentences = text.split(/(?<=[.!?다요])\s+/).map(s => s.trim()).filter(Boolean);
  const relevant = sentences.filter(s => relevantTerms.some(k => s.includes(k)));
  const picked = (relevant.length ? relevant : sentences).slice(0, 3).join(" ");
  return picked.length > maxLen ? picked.slice(0, maxLen).trim() + "…" : picked;
}

// 제목+본문을 합쳐서 봐야 "삼성"은 제목에, "계약"은 본문에 있는 경우도 잡을 수 있음
function matchesAnyKeyword(item){
  const combined = (item.title || "") + " " + (item.description || "");

  // 1. 그 자체로 확실한 증시 키워드면 바로 통과
  if(STRONG_MARKET_KEYWORDS.some(k => combined.includes(k))) return true;

  // 2. 애매한 키워드는 증시 맥락 단어가 같이 있어야 통과 (주식/증권 뉴스가 아니면 걸러냄)
  const hasAmbiguous = CONTEXT_REQUIRED_KEYWORDS.some(k => combined.includes(k));
  if(hasAmbiguous && hasMarketContext(combined)) return true;

  // 3. 삼성/하이닉스 + 계약 같은 조합도 증시 맥락 단어가 같이 있어야 최종 통과
  const hasGroup = KEYWORD_AND_GROUPS.some(group => group.every(k => combined.includes(k)));
  if(hasGroup && hasMarketContext(combined)) return true;

  return false;
}

function matchesKeywordEn(text){
  if(!text) return false;
  const lower = text.toLowerCase();
  return KEYWORDS_EN.some(k => lower.includes(k.toLowerCase()));
}

// 부고·인사·동정란 기사는 회사/지역 이름이 우연히 겹쳐서 걸리는 경우가 많아 제외.
// 단, 대통령의 사망/서거 소식처럼 실제로 중요한 뉴스는 예외로 통과시킨다.
function isObituaryNoise(title){
  if(!title) return false;
  const isPresidentDeath = /대통령/.test(title) && /(사망|서거|타계)/.test(title);
  if(isPresidentDeath) return false;
  return /부고|인사종합|동정|모친상|부친상|별세|빈소|발인/.test(title);
}

function stripHtml(html){
  if(!html) return "";
  const tmp = document.createElement("div");
  tmp.innerHTML = html;
  return (tmp.textContent || tmp.innerText || "").replace(/\s+/g," ").trim();
}

const translateCache = {}; // 같은 문장을 여러 번 번역 요청하지 않도록 캐시
async function translateToKo(text){
  if(!text) return "";
  if(translateCache[text]) return translateCache[text];
  const chunk = text.slice(0, 480); // MyMemory 1회 요청 500byte 제한 대비
  try{
    const res = await fetch("https://api.mymemory.translated.net/get?q=" + encodeURIComponent(chunk) + "&langpair=en|ko");
    const data = await res.json();
    const translated = data?.responseData?.translatedText;
    if(translated){ translateCache[text] = translated; return translated; }
  }catch(e){ /* 번역 실패 시 원문으로 대체 */ }
  return text;
}

async function fetchSource(source){
  const xmlText = await fetchWithProxies(source.url);
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  const items = Array.from(doc.querySelectorAll("item"));
  return items.map(it => ({
    title: it.querySelector("title")?.textContent?.trim() || "(제목 없음)",
    link: it.querySelector("link")?.textContent?.trim() || "#",
    pubDate: new Date(it.querySelector("pubDate")?.textContent || Date.now()),
    description: stripHtml(it.querySelector("description")?.textContent?.trim() || ""),
    source: source.name,
    lang: "ko"
  }));
}

async function fetchSourceEn(source){
  const xmlText = await fetchWithProxies(source.url);
  const doc = new DOMParser().parseFromString(xmlText, "text/xml");
  const items = Array.from(doc.querySelectorAll("item"));
  const matched = items
    .map(it => ({
      titleEn: it.querySelector("title")?.textContent?.trim() || "",
      link: it.querySelector("link")?.textContent?.trim() || "#",
      pubDate: new Date(it.querySelector("pubDate")?.textContent || Date.now()),
      descriptionEn: stripHtml(it.querySelector("description")?.textContent?.trim() || ""),
      source: source.name,
      lang: "en"
    }))
    .filter(it => matchesKeywordEn(it.titleEn) || matchesKeywordEn(it.descriptionEn));

  // 제목만 미리 번역 (본문은 마우스를 올렸을 때 그때그때 번역)
  await Promise.all(matched.map(async it => {
    it.title = await translateToKo(it.titleEn);
    it.description = it.descriptionEn; // 원문 유지, 호버 시 번역
  }));
  return matched;
}

// 네이버 뉴스 검색 (Worker가 /?naver_query=키워드 로 프록시)
async function fetchNaverKeyword(keyword){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), PROXY_TIMEOUT_MS);
  let res;
  try{
    res = await fetch(MY_WORKER + "/?naver_query=" + encodeURIComponent(keyword), { signal: controller.signal });
  }finally{ clearTimeout(timer); }
  if(!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  if(!Array.isArray(data.items)){
    throw new Error("네이버 응답 형식 이상: " + JSON.stringify(data).slice(0,150));
  }
  return data.items.map(it => ({
    title: stripHtml(it.title),
    link: it.originallink || it.link || "#",
    pubDate: new Date(it.pubDate || Date.now()),
    description: stripHtml(it.description || ""),
    source: "네이버",
    lang: "ko"
  }));
}

// 다음(카카오) 웹 문서 검색 — 카카오는 뉴스 전용 API가 없어 웹 문서 검색으로 대체 (Worker가 /?daum_query=키워드 로 프록시)
async function fetchDaumKeyword(keyword){
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), PROXY_TIMEOUT_MS);
  let res;
  try{
    res = await fetch(MY_WORKER + "/?daum_query=" + encodeURIComponent(keyword), { signal: controller.signal });
  }finally{ clearTimeout(timer); }
  if(!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  if(!Array.isArray(data.documents)){
    throw new Error("다음 응답 형식 이상: " + JSON.stringify(data).slice(0,150));
  }
  return data.documents.map(it => ({
    title: stripHtml(it.title),
    link: it.url || "#",
    pubDate: new Date(it.datetime || Date.now()),
    description: stripHtml(it.contents || ""),
    source: "다음",
    lang: "ko"
  }));
}

function delay(ms){ return new Promise(res => setTimeout(res, ms)); }

// 네이버·다음은 검색 API라 "삼성 계약"처럼 두 단어를 붙여서 검색어 자체로 보낼 수 있음
const PORTAL_QUERIES = [
  ...KEYWORDS,
  ...KEYWORD_AND_GROUPS.map(group => group.join(" ")), // ["삼성","계약"] → "삼성 계약"
];

async function fetchPortal(fetchFn, label){
  let merged = [];
  let failCount = 0;
  for(let i = 0; i < PORTAL_QUERIES.length; i++){
    try{
      const items = await fetchFn(PORTAL_QUERIES[i]);
      merged = merged.concat(items);
    }catch(e){
      failCount++;
      console.error(`[${label} · ${PORTAL_QUERIES[i]}] 실패:`, e);
    }
    if(i < PORTAL_QUERIES.length - 1) await delay(250); // 한꺼번에 몰아서 보내지 않도록 약간의 간격을 둠 (버스트 차단 방지)
  }
  if(failCount === PORTAL_QUERIES.length) throw new Error(`${label} 전체 실패`); // 전부 실패하면 소스 자체가 죽은 것으로 처리
  return merged;
}

async function loadAll(){
  document.getElementById("lastUpdated").textContent = "마지막 갱신 — 불러오는 중…";
  const allSources = [...SOURCES.map(s => ({...s, lang:"ko"})), ...SOURCES_EN.map(s => ({...s, lang:"en"}))];
  const fetchTasks = allSources.map(s => s.lang === "en" ? fetchSourceEn(s) : fetchSource(s));

  // 네이버·다음 포털 검색 (Worker에 API 키가 등록돼 있을 때만 시도)
  const portalNames = [];
  if(USE_PORTAL_SEARCH && MY_WORKER){
    fetchTasks.push(fetchPortal(fetchNaverKeyword, "네이버")); portalNames.push("네이버");
    fetchTasks.push(fetchPortal(fetchDaumKeyword, "다음"));   portalNames.push("다음");
  }

  const results = await Promise.allSettled(fetchTasks);
  let mergedKo = [];
  let mergedEn = [];
  failedSources = [];
  results.forEach((r, idx) => {
    const isPortal = idx >= allSources.length;
    const name = isPortal ? portalNames[idx - allSources.length] : allSources[idx].name;
    const lang = isPortal ? "ko" : allSources[idx].lang;
    if(r.status === "fulfilled"){
      if(lang === "en") mergedEn = mergedEn.concat(r.value);
      else mergedKo = mergedKo.concat(r.value);
    }else{
      failedSources.push(name);
      console.error(`[${name}] 로딩 실패:`, r.reason);
    }
  });
  document.getElementById("diag").textContent =
    failedSources.length ? `일부 언론사 로딩 실패: ${failedSources.join(", ")} (F12 → Console 탭에서 상세 원인 확인 가능)` : "";

  // 국내 소스는 한글 키워드로 필터(포털 검색은 이미 키워드로 검색했으니 그대로 통과), 해외 소스는 fetchSourceEn 단계에서 이미 필터됨
  const filteredKo = mergedKo.filter(item => matchesAnyKeyword(item));
  const filtered = filteredKo.concat(mergedEn).filter(item => !isObituaryNoise(item.title));
  filtered.forEach(item => {
    // 한글 "속보" 또는 영문 원제목의 "BREAKING" 둘 다 속보로 인정
    const enBreaking = item.lang === "en" && item.titleEn && /\bbreaking\b/i.test(item.titleEn);
    if(item.title.includes("속보") || enBreaking) item.isBreaking = true;
  });

  // 중복 제거
  const seen = new Set();
  const deduped = [];
  for(const item of filtered.sort((a,b)=>b.pubDate-a.pubDate)){
    const key = normalizeTitle(item.title);
    if(seen.has(key) || seen.has(item.link)) continue;
    seen.add(key); seen.add(item.link);
    deduped.push(item);
  }

  // 탭(언론사)마다 최대 PER_SOURCE_MAX개까지만 (네이버가 압도적으로 많이 잡히는 것 방지)
  const sourceCounts = {};
  const capped = [];
  for(const item of deduped){
    const c = sourceCounts[item.source] || 0;
    if(c >= PER_SOURCE_MAX) continue;
    sourceCounts[item.source] = c + 1;
    capped.push(item);
  }

  allItems = capped.slice(0, MAX_ITEMS);
  buildTabs();
  render();
  updateTape();
  lastLoadTime = Date.now();
  const now = new Date();
  document.getElementById("lastUpdated").textContent =
    "마지막 갱신 — " + now.toLocaleTimeString("ko-KR", {hour:"2-digit", minute:"2-digit"});
}

function buildTabs(){
  const counts = {};
  allItems.forEach(i => { counts[i.source] = (counts[i.source] || 0) + 1; });

  // 기사 수가 많은(=정보가 많은) 언론사 순으로 정렬
  const sourceTabs = Object.keys(counts).sort((a,b) => counts[b]-counts[a]);

  if(!sourceTabs.includes(activeTab) && activeTab !== "ALL") activeTab = "ALL";

  const tabsEl = document.getElementById("tabs");
  const allTab = `<button class="tab ${activeTab==='ALL'?'active':''}" data-tab="ALL">전체<span class="count">${allItems.length}</span></button>`;
  const rest = sourceTabs.map(name =>
    `<button class="tab ${activeTab===name?'active':''}" data-tab="${name}">${name}<span class="count">${counts[name]}</span></button>`
  ).join("");
  tabsEl.innerHTML = allTab + rest;

  tabsEl.querySelectorAll(".tab").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      activeTab = btn.dataset.tab;
      buildTabs();
      render();
    });
  });
}

function render(){
  const list = document.getElementById("list");
  renderedItems = activeTab === "ALL" ? allItems : allItems.filter(i => i.source === activeTab);

  if(renderedItems.length === 0){
    list.innerHTML = '<div class="empty">뉴스를 불러오지 못했습니다. 상단 진단 메시지를 확인하거나 잠시 후 새로고침 해보세요.</div>';
    return;
  }

  const copyIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
  const checkIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;

  list.innerHTML = renderedItems.map((i, idx) => `
    <div class="item ${i.isBreaking ? 'breaking' : ''}">
      <div class="time">${i.pubDate.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"})}<br>${i.pubDate.toLocaleDateString("ko-KR",{month:"2-digit",day:"2-digit"})}</div>
      <div>
        <a class="title" href="${i.link}" target="_blank" rel="noopener noreferrer" data-idx="${idx}">${i.title}</a>
        <div class="src">${i.source}</div>
      </div>
      <button class="copy-btn" data-idx="${idx}" title="링크 복사">${copyIcon}</button>
    </div>
  `).join("");

  list.querySelectorAll(".copy-btn").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const item = renderedItems[Number(btn.dataset.idx)];
      try{
        await navigator.clipboard.writeText(item.link);
      }catch(e){
        // 클립보드 API를 못 쓰는 환경(예: file:// 일부 브라우저) 대비 폴백
        const ta = document.createElement("textarea");
        ta.value = item.link; document.body.appendChild(ta);
        ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      }
      btn.innerHTML = checkIcon;
      btn.classList.add("copied");
      setTimeout(()=>{ btn.innerHTML = copyIcon; btn.classList.remove("copied"); }, 1200);
    });
  });

  const preview = document.getElementById("previewPanel");
  let hoverToken = 0; // 빠르게 여러 기사를 오갈 때 오래된 번역 응답이 늦게 도착해 덮어쓰는 것 방지

  list.querySelectorAll("a.title").forEach(el=>{
    el.addEventListener("mouseenter", async ()=>{
      const myToken = ++hoverToken;
      const item = renderedItems[Number(el.dataset.idx)];
      if(!item) return;

      const renderPanel = (bodyHtml) => {
        if(myToken !== hoverToken) return; // 이미 다른 기사로 넘어간 경우 무시
        preview.innerHTML = `
          <div class="pv-src">${item.source}${item.lang === "en" ? " · 번역됨" : ""}</div>
          <div class="pv-title">${item.title}</div>
          <div class="pv-body">${bodyHtml}</div>
        `;
        preview.classList.add("show");
      };

      if(!item.description){
        renderPanel("본문 미리보기를 제공하지 않는 기사입니다. 링크를 눌러 원문을 확인하세요.");
        return;
      }

      if(item.lang === "en"){
        renderPanel(`<span class="pv-loading">번역 중…</span>`);
        const translated = await translateToKo(item.description);
        renderPanel(condenseMarketText(translated));
      }else{
        renderPanel(condenseMarketText(item.description));
      }
    });

    el.addEventListener("mouseleave", ()=>{
      hoverToken++; // 진행 중이던 번역 결과 무시
      preview.classList.remove("show");
    });
  });
}

function timeAgo(date){
  const diffMin = Math.floor((Date.now() - date.getTime()) / 60000);
  if(diffMin < 1) return "방금 전";
  if(diffMin < 60) return diffMin + "분 전";
  const diffHour = Math.floor(diffMin / 60);
  if(diffHour < 24) return diffHour + "시간 전";
  return Math.floor(diffHour / 24) + "일 전";
}

function updateTape(){
  // 속보(한글 "속보" 또는 영문 "BREAKING")만
  const tape2 = document.getElementById("tape2");
  const breaking = allItems.filter(i => i.isBreaking).slice(0, 16);
  tape2.innerHTML = breaking.length
    ? breaking.map(i => `<span>● ${i.title}</span>`).join("")
    : `<span>현재 조건에 맞는 속보가 없습니다</span>`;
}

// ---- 1번째 줄: 실시간 시장 지표 (뉴스와 별도로 더 자주 갱신) ----
// 표시명 → Stooq 시세 기호. 코스피 야간선물(CME)과 두바이유는 무료로 실시간 제공하는 곳이 없어서 뺐음.
const MARKET_SYMBOLS = [
  { name: "코스피",     sym: "^kospi" },
  { name: "코스닥",     sym: "^kosdaq" },
  { name: "나스닥",     sym: "^ndq" },
  { name: "나스닥선물", sym: "nq.f" },
  { name: "S&P",       sym: "^spx" },
  { name: "반도체지수", sym: "^sox" },
  { name: "환율",       sym: "usdkrw" },
  { name: "美10Y",      sym: "10usy.b" },
  { name: "WTI",       sym: "cl.f" },
  { name: "브렌트유",   sym: "cb.f" },
  { name: "금",         sym: "gc.f" },
  { name: "은",         sym: "si.f" },
  { name: "구리",       sym: "hg.f" },
  { name: "알루미늄",   sym: "alu.f" },
  { name: "천연가스",   sym: "ng.f" },
  { name: "비트코인",   sym: "btc.v" },
];
const MARKET_REFRESH_MS = 60 * 1000; // 뉴스보다 훨씬 자주(1분) 갱신

function parseStooqCsv(csvText){
  const lines = csvText.trim().split("\n");
  const map = {};
  for(let i = 1; i < lines.length; i++){ // 0번째 줄은 헤더
    const cols = lines[i].split(",");
    if(cols.length < 7) continue;
    const [symbol, , , open, , , close] = cols;
    map[symbol.toLowerCase()] = { open: parseFloat(open), close: parseFloat(close) };
  }
  return map;
}

async function updateMarketTicker(){
  const marketRow = document.getElementById("marketRow");
  try{
    const symbolsParam = MARKET_SYMBOLS.map(m => m.sym).join(",");
    const url = "https://stooq.com/q/l/?s=" + encodeURIComponent(symbolsParam) + "&f=sd2t2ohlcv&h&e=csv";
    const csvText = await fetchWithProxies(url);
    const quotes = parseStooqCsv(csvText);

    marketRow.innerHTML = MARKET_SYMBOLS.map(m => {
      const q = quotes[m.sym.toLowerCase()];
      if(!q || isNaN(q.close) || !q.open){
        return `<span class="mkt"><span class="mkt-name">${m.name}</span><span class="mkt-val">-</span></span>`;
      }
      const pct = ((q.close - q.open) / q.open) * 100;
      const sign = pct > 0 ? "▲" : pct < 0 ? "▼" : "-";
      const cls = pct > 0 ? "up" : pct < 0 ? "down" : "";
      return `<span class="mkt">
        <span class="mkt-name">${m.name}</span>
        <span class="mkt-val">${q.close.toLocaleString("ko-KR", {maximumFractionDigits:2})}</span>
        <span class="mkt-chg ${cls}">${sign} ${Math.abs(pct).toFixed(2)}%</span>
      </span>`;
    }).join("");
  }catch(e){
    console.error("[시장 지표] 로딩 실패:", e);
    marketRow.innerHTML = `<span class="mkt"><span class="mkt-name">시장 지표를 불러오지 못했습니다</span></span>`;
  }
}

updateMarketTicker();
setInterval(updateMarketTicker, MARKET_REFRESH_MS);

// ---- F5 새로고침에 10초 딜레이 적용 (버튼은 없앰) ----
let lastLoadTime = 0;
window.addEventListener("keydown", (e) => {
  const isRefreshKey = e.key === "F5" || ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "r");
  if(!isRefreshKey) return;
  e.preventDefault(); // 브라우저의 실제 새로고침(전체 페이지 리로드) 대신 아래 로직으로 대체
  const elapsed = Date.now() - lastLoadTime;
  if(elapsed < 10000){
    document.getElementById("diag").textContent = `너무 빠릅니다 — ${Math.ceil((10000 - elapsed)/1000)}초 후 다시 시도하세요.`;
    return;
  }
  loadAll();
});

loadAll();
setInterval(loadAll, REFRESH_MS);
